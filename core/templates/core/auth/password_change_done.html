{% extends 'core/base.html' %}
{% load static %}

{% block title %}Password Changed | Qubix{% endblock %}

{% block extra_css %}
<style>
.success-container {
  max-width: 500px;
  margin: 0 auto;
  padding: 60px 20px;
  text-align: center;
}

.success-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 32px;
}

.success-icon {
  width: 80px;
  height: 80px;
  background: rgba(14,203,129,0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
}

.success-icon i {
  font-size: 40px;
  color: var(--green);
}

.success-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
}

.success-message {
  font-size: 14px;
  color: var(--muted2);
  margin-bottom: 32px;
  line-height: 1.6;
}

.btn-dashboard {
  background: var(--gold);
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}

.btn-dashboard:hover {
  background: #e0a800;
  transform: translateY(-2px);
}
</style>
{% endblock %}

{% block content %}
<div class="success-container">
  <div class="success-card">
    <div class="success-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <div class="success-title">Password Changed!</div>
    <div class="success-message">
      Your password has been successfully updated.<br>
      Use your new password next time you log in.
    </div>
    <a href="{% url 'dashboard' %}" class="btn-dashboard">
      <i class="fas fa-home"></i> Go to Dashboard
    </a>
  </div>
</div>
{% endblock %}
