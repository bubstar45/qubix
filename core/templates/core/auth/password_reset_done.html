{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent | Qubix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#f1f5f9] min-h-screen">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <img src="{% static 'images/logo-icon.png' %}" alt="Qubix Logo" class="w-16 h-16 rounded-xl shadow-lg">
                </div>
                <h2 class="text-3xl font-bold text-white">Check Your Email</h2>
                <p class="text-[#94a3b8] mt-2">We've sent you a password reset link</p>
            </div>

            <!-- Success Card -->
            <div class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-8 shadow-2xl text-center">
                <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-envelope text-3xl text-green-400"></i>
                </div>
                <p class="text-[#94a3b8] mb-6">
                    If you have an account with us, we've sent a password reset link to your email address.
                </p>
                <div class="text-center text-sm mt-4">
                    <a href="{% url 'login' %}" class="text-[#3d7eff] hover:text-[#a855f7] font-medium transition-colors">
                        ← Back to Login
                    </a>
                </div>
                <div class="mt-4 pt-4 border-t border-white/10 text-center">
                    <a href="{% url 'landing' %}" class="text-[#64748b] hover:text-[#94a3b8] text-sm transition-colors">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
