{% load crispy_forms_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Qubix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#f1f5f9] min-h-screen">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <img src="{% static 'images/logo-icon.png' %}" alt="Qubix Logo" class="w-16 h-16 rounded-xl shadow-lg">
                </div>
                <h2 class="text-3xl font-bold text-white">Forgot Password?</h2>
                <p class="text-[#94a3b8] mt-2">Enter your email and we'll send you a reset link</p>
            </div>

            <!-- Forgot Password Card -->
            <div class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-8 shadow-2xl">
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    {% if form.non_field_errors %}
                        <div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg p-3 text-sm">
                            {{ form.non_field_errors }}
                        </div>
                    {% endif %}
                    
                    <div>
                        <label for="id_email" class="block text-sm font-medium text-[#94a3b8] mb-2">Email Address</label>
                        <input type="email" name="email" id="id_email" required 
                               class="w-full px-4 py-3 bg-[#1e293b] border border-[#334155] rounded-xl text-white placeholder-[#64748b] focus:outline-none focus:border-[#3d7eff] focus:ring-1 focus:ring-[#3d7eff] transition-colors"
                               placeholder="you@example.com">
                    </div>
                    
                    <button type="submit" 
                            class="w-full py-3 bg-gradient-to-r from-[#3d7eff] to-[#a855f7] text-white font-semibold rounded-xl text-lg hover:opacity-90 transition-all duration-200 shadow-lg">
                        Send Reset Link
                    </button>
                </form>
                
                <div class="text-center text-sm mt-6">
                    <span class="text-[#94a3b8]">Remember your password?</span>
                    <a href="{% url 'login' %}" class="text-[#3d7eff] hover:text-[#a855f7] font-medium ml-1 transition-colors">Back to Login</a>
                </div>
                
                <div class="mt-6 pt-6 border-t border-white/10 text-center">
                    <a href="{% url 'landing' %}" class="text-[#64748b] hover:text-[#94a3b8] text-sm transition-colors">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
